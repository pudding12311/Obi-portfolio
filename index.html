    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f4f4;
            color: #000;
        }

        /* 文字方塊的基礎陰影 */
        .card-shadow {
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        }

        /* 拿起書本的 3D 動畫核心設定 */
        .book-lift {
            transition: all 0.7s cubic-bezier(0.25, 0.8, 0.25, 1);
            /* 如海浪般的平滑貝茲曲線 */
            transform-style: preserve-3d;
        }

        /* 左側雜誌 Hover：往上浮起、些微放大、並帶有一點點向右傾斜的實體感 */
        .group:hover .book-lift-left {
            transform: translateY(-20px) scale(1.05) perspective(1000px) rotateY(3deg) rotateX(2deg);
            box-shadow: -15px 30px 60px -15px rgba(0, 50, 100, 0.3);
            /* 帶有海洋色調的深陰影 */
        }

        /* 右側藍圖 Hover：往上浮起、些微放大、並帶有一點點向左傾斜的實體感 */
        .group:hover .book-lift-right {
            transform: translateY(-20px) scale(1.05) perspective(1000px) rotateY(-3deg) rotateX(2deg);
            box-shadow: 15px 30px 60px -15px rgba(0, 50, 100, 0.3);
        }
    </style>
</head>
